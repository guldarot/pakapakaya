name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "apps/backend_api/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "apps/backend_api/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend_api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/backend_api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build backend
        run: npm run build

      - name: Build Docker image
        run: docker build -t pakapakaya-backend-ci .
