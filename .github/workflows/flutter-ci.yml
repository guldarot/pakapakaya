name: Flutter CI

on:
  push:
    branches: [main]
    paths:
      - "apps/flutter_app/**"
      - "packages/contracts/**"
      - ".github/workflows/flutter-ci.yml"
  pull_request:
    paths:
      - "apps/flutter_app/**"
      - "packages/contracts/**"
      - ".github/workflows/flutter-ci.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/flutter_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build web
        run: flutter build web --release
