name: Deploy Backend to Cloud Run

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Container image tag"
        required: false
        default: "manual"
      environment:
        description: "Deployment environment label"
        required: false
        default: "production"

env:
  SERVICE_NAME: pakapakaya-backend
  REGION: asia-south1
  GAR_LOCATION: asia-south1
  REPOSITORY: pakapakaya

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker $GAR_LOCATION-docker.pkg.dev

      - name: Build image
        run: docker build -t $GAR_LOCATION-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/$REPOSITORY/$SERVICE_NAME:${{ github.event.inputs.image_tag }} ./apps/backend_api

      - name: Push image
        run: docker push $GAR_LOCATION-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/$REPOSITORY/$SERVICE_NAME:${{ github.event.inputs.image_tag }}

      - name: Deploy to Cloud Run
        run: >
          gcloud run deploy $SERVICE_NAME
          --project=${{ secrets.GCP_PROJECT_ID }}
          --region=$REGION
          --platform=managed
          --image=$GAR_LOCATION-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/$REPOSITORY/$SERVICE_NAME:${{ github.event.inputs.image_tag }}
          --allow-unauthenticated
          --set-env-vars=PERSISTENCE_MODE=prisma,STORAGE_DRIVER=gcs
