services:
  postgres:
    image: postgres:16
    container_name: pakapakaya-postgres
    environment:
      POSTGRES_DB: pakapakaya
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pakapakaya"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pakapakaya-backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.docker
    ports:
      - "4000:4000"
    volumes:
      - storage-data:/app/data/storage

volumes:
  postgres-data:
  storage-data:
